<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> YITZCHOK & DEVORA</title>
    <style>
        * {
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box !important;
        }
        
        html {
            margin: 0 !important;
            padding: 0 !important;
            height: 100vh !important;
            width: 100vw !important;
            overflow-x: hidden !important;
            overflow-y: auto !important;
        }
        
        .fullscreen-bg {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: -1 !important;
            overflow: hidden !important;
        }
        
        .fullscreen-bg img {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            object-position: center !important;
        }
        
        body {
            margin: 0 !important;
            padding: 50px 0 !important;
            height: 100% !important;
            width: 100% !important;
            overflow-x: hidden !important;
            background: none !important;
            background-color: transparent !important;
            font-family: Arial, sans-serif;
            color: rgb(116, 106, 106);
            text-align: center;
            position: relative;
        }
        
        .countdown {
            font-size: 5em;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            flex-wrap: nowrap;
            max-width: 95%;
        }
        .time-unit {
            background: linear-gradient(145deg, 
                rgba(255, 255, 255, 0.98) 0%, 
                rgba(252, 254, 255, 0.95) 30%,
                rgba(248, 250, 252, 0.92) 70%,
                rgba(241, 245, 249, 0.9) 100%);
            border: 3px solid rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px 35px;
            transition: all 0.3s ease;
            margin: 0;
            box-shadow: 
                0 0 25px rgba(255, 215, 0, 0.7),
                0 0 40px rgba(255, 255, 255, 0.8),
                0 0 60px rgba(255, 215, 0, 0.5),
                0 25px 60px rgba(0, 0, 0, 0.15),
                0 15px 35px rgba(0, 0, 0, 0.1),
                0 8px 20px rgba(0, 0, 0, 0.08),
                inset 0 4px 0 rgba(255, 255, 255, 1),
                inset 0 -2px 0 rgba(0, 0, 0, 0.03);
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 800;
            color: #0f3415;
            text-shadow: 
                0 0 15px rgba(255, 215, 0, 0.8),
                0 0 8px rgba(255, 215, 0, 0.6),
                0 2px 5px rgba(255, 255, 255, 0.9),
                0 1px 3px rgba(255, 255, 255, 1);
            position: relative;
            z-index: 15;
            backdrop-filter: blur(20px) saturate(1.4);
            min-width: 140px;
            text-align: center;
            overflow: hidden;
            animation: gentleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes gentleGlow {
            0% {
                box-shadow: 
                    0 0 30px rgba(255, 215, 0, 0.8),
                    0 0 50px rgba(255, 255, 255, 0.9),
                    0 0 70px rgba(255, 215, 0, 0.6),
                    0 25px 60px rgba(0, 0, 0, 0.15),
                    0 15px 35px rgba(0, 0, 0, 0.1),
                    0 8px 20px rgba(0, 0, 0, 0.08),
                    inset 0 4px 0 rgba(255, 255, 255, 1),
                    inset 0 -2px 0 rgba(0, 0, 0, 0.03);
                text-shadow: 
                    0 0 20px rgba(255, 215, 0, 0.9),
                    0 0 10px rgba(255, 215, 0, 0.7),
                    0 2px 5px rgba(255, 255, 255, 0.9),
                    0 1px 3px rgba(255, 255, 255, 1);
            }
            100% {
                box-shadow: 
                    0 0 45px rgba(255, 215, 0, 1),
                    0 0 65px rgba(255, 255, 255, 1),
                    0 0 85px rgba(255, 215, 0, 0.8),
                    0 25px 60px rgba(0, 0, 0, 0.15),
                    0 15px 35px rgba(0, 0, 0, 0.1),
                    0 8px 20px rgba(0, 0, 0, 0.08),
                    inset 0 4px 0 rgba(255, 255, 255, 1),
                    inset 0 -2px 0 rgba(0, 0, 0, 0.03);
                text-shadow: 
                    0 0 30px rgba(255, 215, 0, 1),
                    0 0 15px rgba(255, 215, 0, 0.9),
                    0 2px 5px rgba(255, 255, 255, 0.9),
                    0 1px 3px rgba(255, 255, 255, 1);
            }
        }

        .label {
            font-size: 0.35em;
            display: block;
            margin-top: 8px;
            font-weight: 600;
            color: #2d5233;
            text-shadow: 
                0 1px 2px rgba(255, 255, 255, 0.9),
                0 1px 0 rgba(255, 255, 255, 0.7);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .separator {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 
                0 0 20px rgba(255, 215, 0, 0.8),
                0 0 35px rgba(255, 255, 255, 1),
                0 0 50px rgba(255, 255, 255, 0.9),
                0 0 70px rgba(255, 215, 0, 0.6),
                4px 4px 8px rgba(0, 0, 0, 0.5);
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3));
            position: relative;
            z-index: 20;
            margin: 0;
            padding: 0;
            line-height: 1;
            animation: separatorGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes separatorGlow {
            0% {
                text-shadow: 
                    0 0 25px rgba(255, 215, 0, 0.9),
                    0 0 40px rgba(255, 255, 255, 1),
                    0 0 60px rgba(255, 255, 255, 0.9),
                    0 0 80px rgba(255, 215, 0, 0.7),
                    4px 4px 8px rgba(0, 0, 0, 0.5);
            }
            100% {
                text-shadow: 
                    0 0 35px rgba(255, 215, 0, 1),
                    0 0 55px rgba(255, 255, 255, 1),
                    0 0 75px rgba(255, 255, 255, 1),
                    0 0 95px rgba(255, 215, 0, 0.8),
                    4px 4px 8px rgba(0, 0, 0, 0.5);
            }
        }
        
        .bottom-image {
            max-width: 450px;
            width: 90%;
            height: auto;
            margin-top: 60px;
            border-radius: 25px;
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.4),
                0 8px 20px rgba(0, 0, 0, 0.2);
            border: 4px solid rgba(255, 255, 255, 0.9);
            transition: all 0.4s ease;
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
        }

        .txt {
            font-size:4em;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-family: Guttman Yad-Brush;
            text-align: center;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            -webkit-text-stroke: 0.4px rgba(0, 0, 0, 0.8);
            text-stroke: 1px rgba(0, 0, 0, 0.8);
            text-shadow: 
                0 0 15px rgba(255, 255, 255, 1),
                0 0 30px rgba(255, 255, 255, 0.8),
                0 0 45px rgba(255, 255, 255, 0.6),
                3px 3px 6px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }
        .txt2 {
            font-size:3em;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-family: Guttman Yad-Brush;
            position: fixed;
            bottom: 300px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }
        
        .countdown:hover .time-unit {
            transform: scale(1.15);
            background: linear-gradient(145deg, 
                rgba(255, 255, 255, 1) 0%, 
                rgba(252, 254, 255, 1) 30%,
                rgba(248, 250, 252, 1) 70%,
                rgba(241, 245, 249, 1) 100%);
            box-shadow: 
                0 0 40px rgba(255, 215, 0, 1),
                0 0 60px rgba(255, 255, 255, 1),
                0 0 80px rgba(255, 215, 0, 0.8),
                0 25px 60px rgba(0, 0, 0, 0.15),
                0 15px 35px rgba(0, 0, 0, 0.1),
                0 8px 20px rgba(0, 0, 0, 0.08),
                inset 0 4px 0 rgba(255, 255, 255, 1),
                inset 0 -2px 0 rgba(0, 0, 0, 0.03);
            color: #1a5d23;
            text-shadow: 
                0 0 25px rgba(255, 215, 0, 1),
                0 0 15px rgba(255, 215, 0, 0.8),
                0 2px 5px rgba(255, 255, 255, 0.9),
                0 1px 3px rgba(255, 255, 255, 1);
            animation: none;
        }
        
        .countdown:hover .separator {
            transform: scale(1.15);
            text-shadow: 
                0 0 30px rgba(255, 215, 0, 1),
                0 0 50px rgba(255, 255, 255, 1),
                0 0 70px rgba(255, 255, 255, 0.9),
                0 0 90px rgba(255, 215, 0, 0.8),
                4px 4px 8px rgba(0, 0, 0, 0.5);
            animation: none;
        }
        
        .heart {
            color: #ff69b4;
            font-size: 1.3em;
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
        }
        
        .floating-heart {
            position: absolute;
            font-size: 2.5em;
            color: #ff69b4;
            animation: floatUp 4s ease-out infinite;
            opacity: 0;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translateY(-50vh) rotate(180deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) rotate(360deg);
            }
        }
        
        .celebration-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            color: rgba(255, 255, 255, 0.95);
            font-family: 'Guttman Yad-Brush', serif;
            text-align: center;
            z-index: 1001;
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 1),
                0 0 40px rgba(255, 105, 180, 0.8),
                0 0 60px rgba(255, 105, 180, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="fullscreen-bg">
        <img src="1.jpg" alt="Background">
    </div>
    
    <!-- מוזיקת רקע -->
    <audio id="backgroundMusic" loop preload="auto">
        <source src="חופה.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    
    <div class="countdown" id="countdown">
        <div class="time-unit" id="days"></div>
        <div class="separator">:</div>
        <div class="time-unit" id="hours"></div>
        <div class="separator">:</div>
        <div class="time-unit" id="minutes"></div>
        <div class="separator">:</div>
        <div class="time-unit" id="seconds"></div>
    </div>
    <div class="txt">!!!מזל טוב </div>
    <script>
        // הפעלת מוזיקה בתנועת עכבר
        let musicStarted = false;
        
        document.addEventListener('mousemove', function startMusic() {
            if (!musicStarted) {
                const audio = document.getElementById('backgroundMusic');
                audio.volume = 0.7;
                audio.play().then(() => {
                    musicStarted = true;
                    console.log('🎵 Music started!');
                    // הסר את האירוע כדי שלא יקרה שוב
                    document.removeEventListener('mousemove', startMusic);
                }).catch((error) => {
                    console.log('❌ Music failed:', error);
                });
            }
        });
        
        // Set the date we're counting down to
        const countDownDate = new Date("August 10, 2026 18:00:00").getTime();

        // Update the countdown every 1 second
        const x = setInterval(function() {
            // Get today's date and time
            const now = new Date().getTime();
            
            // Find the distance between now and the countdown date
            const distance = countDownDate - now;

            // Time calculations for days, hours, minutes, and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days + "<span class='label'>ימים</span>";
            document.getElementById("hours").innerHTML = hours + "<span class='label'>שעות</span>";
            document.getElementById("minutes").innerHTML = minutes + "<span class='label'>דקות</span>";
            document.getElementById("seconds").innerHTML = seconds + "<span class='label'>שניות</span>";

            // If the countdown is finished, display celebration
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "";
                
                // הסר כיתובים
                document.querySelector(".txt").style.display = "none";
                document.querySelector(".txt2").style.display = "none";
                
                // יצור אנימציית לבבות
                const celebration = document.createElement('div');
                celebration.className = 'celebration';
                document.body.appendChild(celebration);
                
                // טקסט חגיגי
                const celebrationText = document.createElement('div');
                celebrationText.className = 'celebration-text';
                celebrationText.innerHTML = '💕 מזל טוב 💕';
                document.body.appendChild(celebrationText);
                
                // יצור לבבות מרחפים
                function createHearts() {
                    const heart = document.createElement('div');
                    heart.className = 'floating-heart';
                    heart.innerHTML = '💖';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 2 + 's';
                    celebration.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 4000);
                }
                
                // יצור לב חדש כל 300ms
                setInterval(createHearts, 300);
            }
        }, 1000);
    </script>
</body>
</html>
